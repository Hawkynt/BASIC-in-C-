name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # release.yml can call this via `uses: ./.github/workflows/ci.yml`
  # so releases run the exact same matrix as per-PR CI.
  workflow_call: {}

# ---------------------------------------------------------------------------
# BASIC.h is a Win32 header (windows.h + conio.h), so both matrix legs build
# FOR Windows: the windows leg natively with MSVC (the project's home turf),
# the ubuntu leg cross-compiles with mingw-w64 so a second, pickier compiler
# keeps the macro madness honest.
#
# Required tier: build ConsoleSnake + compile/run the macro smoke suite.
# ---------------------------------------------------------------------------

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # version.pl needs full history

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Set up mingw-w64 cross-compiler
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Build (MSVC)
        if: runner.os == 'Windows'
        run: msbuild ConsoleSnake/ConsoleSnake.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Build (mingw-w64 cross)
        if: runner.os == 'Linux'
        run: x86_64-w64-mingw32-g++ -std=c++17 -Wall -static -o ConsoleSnake.exe ConsoleSnake/ConsoleSnake.cpp

      # This tier is REQUIRED -- do NOT add continue-on-error here.
      # (dash-style cl flags because MSYS bash mangles slash-style ones)
      - name: Test (MSVC) — compile and run every suite in tests/
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          for f in tests/*.cpp; do
            name=$(basename "$f" .cpp)
            echo "=== $name ==="
            cl -nologo -EHsc -std:c++17 -W4 "$f" -Fe:"$name.exe"
            "./$name.exe"
          done

      # Cross-built binaries can't run on the Linux host, so this leg is a
      # compile-only check of the same suites (the windows leg executes them).
      - name: Test (mingw-w64 cross) — compile every suite in tests/
        if: runner.os == 'Linux'
        run: |
          set -e
          for f in tests/*.cpp; do
            echo "=== $f ==="
            x86_64-w64-mingw32-g++ -std=c++17 -Wall -static -o "$(basename "$f" .cpp).exe" "$f"
          done
