name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # release.yml can call this via `uses: ./.github/workflows/ci.yml`
  # so releases run the exact same matrix as per-PR CI.
  workflow_call: {}

# ---------------------------------------------------------------------------
# BASIC.h carries a Win32 backend (windows.h + conio.h) and a POSIX backend
# (termios + ANSI), so the suites BUILD AND RUN natively on all three OSes:
#   windows  - MSVC, the project's home turf
#   ubuntu   - native g++, plus a mingw-w64 cross-compile of the Win32 path
#              so a second compiler keeps the #ifdef _WIN32 side honest
#   macos    - clang, because the 80s deserve retina
#
# Required tier: build ConsoleSnake + demo, compile & run every tests/ suite.
# ---------------------------------------------------------------------------

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # version.pl needs full history

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Set up mingw-w64 cross-compiler
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Build (MSVC)
        if: runner.os == 'Windows'
        run: msbuild ConsoleSnake/ConsoleSnake.sln /m /p:Configuration=Release /p:Platform=x64

      # (-o snake: "ConsoleSnake" the directory is already squatting that name)
      - name: Build (native g++)
        if: runner.os == 'Linux'
        run: g++ -std=c++17 -Wall -O2 -o snake ConsoleSnake/ConsoleSnake.cpp

      - name: Build (native clang)
        if: runner.os == 'macOS'
        run: clang++ -std=c++17 -Wall -O2 -o snake ConsoleSnake/ConsoleSnake.cpp

      # gcc eyes on the Win32 backend, so #ifdef _WIN32 breakage shows up here
      - name: Cross-check the Win32 path (mingw-w64)
        if: runner.os == 'Linux'
        run: |
          x86_64-w64-mingw32-g++ -std=c++17 -Wall -static -o ConsoleSnake.exe ConsoleSnake/ConsoleSnake.cpp
          x86_64-w64-mingw32-g++ -std=c++17 -Wall -O2 -static -o demo.exe Demos/SecondUnreality.cpp

      # The demoscene tribute is compile-only: CI runners don't deserve plasma.
      - name: Build demo (MSVC, compile-only)
        if: runner.os == 'Windows'
        shell: bash
        run: cl -nologo -EHsc -std:c++17 -W4 -O2 Demos/SecondUnreality.cpp -Fe:demo.exe

      - name: Build demo (native, compile-only)
        if: runner.os != 'Windows'
        run: c++ -std=c++17 -Wall -O2 -o demo Demos/SecondUnreality.cpp

      # This tier is REQUIRED -- do NOT add continue-on-error here.
      # (dash-style cl flags because MSYS bash mangles slash-style ones)
      - name: Test (MSVC) — compile and run every suite in tests/
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          for f in tests/*.cpp; do
            name=$(basename "$f" .cpp)
            echo "=== $name ==="
            cl -nologo -EHsc -std:c++17 -W4 "$f" -Fe:"$name.exe"
            "./$name.exe"
          done

      - name: Test (native) — compile and run every suite in tests/
        if: runner.os != 'Windows'
        run: |
          set -e
          for f in tests/*.cpp; do
            name=$(basename "$f" .cpp)
            echo "=== $name ==="
            c++ -std=c++17 -Wall -o "$name" "$f"
            "./$name"
          done
